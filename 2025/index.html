<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новогоднее поздравление</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: #ffffff;
            position: relative;
        }
        #clock {
            font-size: 1rem;
            font-family: monospace;
            position: fixed;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 4px;
            z-index: 1000;
            white-space: nowrap;
        }
        #videoContainer {
            max-width: 1200px;
            width: 90vw;
            aspect-ratio: 16/9;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            display: none;
        }
        .message {
            font-size: 2rem;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            z-index: 1;
        }
        #customControls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            display: none;
            gap: 10px;
            z-index: 2;
        }
        #muteButton, #fullscreenButton {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 1.2em;
            transition: transform 0.2s;
        }
        #muteButton:hover, #fullscreenButton:hover {
            transform: scale(1.1);
        }
        /* Стили для полноэкранного режима */
        video:fullscreen {
            border-radius: 0;
        }
        #videoContainer:fullscreen {
            max-width: none;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            background: black;
        }
    </style>
</head>
<body>
    <div id="clock"></div>
    <div id="videoContainer">
        <video id="videoPlayer" autoplay playsinline preload="auto">
            <source src="video.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео тег.
        </video>
        <div id="message" class="message"></div>
        <div id="customControls">
            <button id="muteButton">🔇</button>
            <button id="fullscreenButton">⛶</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Предварительная загрузка видео
            const video = document.getElementById('videoPlayer');
            video.load();
            
            // Принудительная предварительная буферизация
            video.addEventListener('loadedmetadata', () => {
                video.currentTime = 0;
                video.pause();
            });
        });

        // Заменим конфигурацию видео на более точную
        const videoConfig = {
            bellsTimeMinutes: 4,
            bellsTimeSeconds: 49,
            bellsTimeMillis: 500,
            targetHours: 22,
            targetMinutes: 40,
            targetSeconds: 0
        };

        // Объект для хранения расчетного времени начала воспроизведения
        const startTime = {};

        // Устанавливаем точное время начала воспроизведения
        function calculateStartTime() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(videoConfig.targetHours, videoConfig.targetMinutes, videoConfig.targetSeconds, 0);
            
            // Если полночь уже прошла, берем следующий день
            if (midnight < now) {
                midnight.setDate(midnight.getDate() + 1);
            }

            // Вычитаем время до курантов в видео (переводим всё в миллисекунды)
            const bellsStartTime = (videoConfig.bellsTimeMinutes * 60 * 1000) + 
                                 (videoConfig.bellsTimeSeconds * 1000) + 
                                 videoConfig.bellsTimeMillis;
            const startDateTime = new Date(midnight);
            startDateTime.setMilliseconds(startDateTime.getMilliseconds() - bellsStartTime);

            startTime.hours = startDateTime.getHours();
            startTime.minutes = startDateTime.getMinutes();
            startTime.seconds = startDateTime.getSeconds();
            startTime.milliseconds = startDateTime.getMilliseconds();
        }

        calculateStartTime();

        const video = document.getElementById('videoPlayer');
        const videoContainer = document.getElementById('videoContainer');
        const muteButton = document.getElementById('muteButton');
        const fullscreenButton = document.getElementById('fullscreenButton');
        const customControls = document.getElementById('customControls');

        // Обработчик кнопки включения/выключения звука
        muteButton.addEventListener('click', () => {
            video.muted = !video.muted;
            muteButton.textContent = video.muted ? '🔇' : '🔊';
        });

        // Обработчик кнопки полноэкранного режима
        fullscreenButton.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                if (videoContainer.requestFullscreen) {
                    videoContainer.requestFullscreen();
                } else if (videoContainer.webkitRequestFullscreen) {
                    videoContainer.webkitRequestFullscreen();
                } else if (videoContainer.msRequestFullscreen) {
                    videoContainer.msRequestFullscreen();
                }
                fullscreenButton.textContent = '⮌';
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
                fullscreenButton.textContent = '⛶';
            }
        });

        // Обработчик изменения состояния полноэкранного режима
        document.addEventListener('fullscreenchange', () => {
            fullscreenButton.textContent = document.fullscreenElement ? '⮌' : '⛶';
        });

        // Показываем/скрываем кастомные контролы при наведении
        videoContainer.addEventListener('mouseenter', () => {
            customControls.style.display = 'flex';
        });

        videoContainer.addEventListener('mouseleave', () => {
            if (!document.fullscreenElement) {
                customControls.style.display = 'none';
            }
        });

        // Добавим переменную для отслеживания состояния видео
        let videoStarted = false;

        // Добавим функцию для более точного определения времени
        function getCurrentTime() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (3600000 * 10)); // UTC+10
        }

        function updateClock() {
            const utcPlus10 = getCurrentTime();
            
            const hours = utcPlus10.getHours().toString().padStart(2, '0');
            const minutes = utcPlus10.getMinutes().toString().padStart(2, '0');
            const seconds = utcPlus10.getSeconds().toString().padStart(2, '0');
            const millis = utcPlus10.getMilliseconds().toString().padStart(3, '0');
            
            // Вычисляем время до Нового Года
            const newYearTime = new Date(utcPlus10);
            newYearTime.setHours(videoConfig.targetHours, videoConfig.targetMinutes, videoConfig.targetSeconds, 0);
            
            if (newYearTime < utcPlus10) {
                newYearTime.setDate(newYearTime.getDate() + 1);
            }
            
            // Вычисляем время начала трансляции
            const startTime = new Date(newYearTime);
            startTime.setMinutes(startTime.getMinutes() - videoConfig.bellsTimeMinutes);
            startTime.setSeconds(startTime.getSeconds() - videoConfig.bellsTimeSeconds);
            startTime.setMilliseconds(startTime.getMilliseconds() - videoConfig.bellsTimeMillis);

            const timeToStart = startTime.getTime() - utcPlus10.getTime();
            const timeLeft = newYearTime.getTime() - utcPlus10.getTime();

            // Обновляем часы
            if (timeLeft > 0) {
                const hoursLeft = Math.floor(timeLeft / 3600000).toString().padStart(2, '0');
                const minutesLeft = Math.floor((timeLeft % 3600000) / 60000).toString().padStart(2, '0');
                const secondsLeft = Math.floor((timeLeft % 60000) / 1000).toString().padStart(2, '0');
                const millisLeft = (timeLeft % 1000).toString().padStart(3, '0');
                
                document.getElementById('clock').textContent = 
                    `${hours}:${minutes}:${seconds}.${millis} (UTC+10) | До Нового Года: ${hoursLeft}:${minutesLeft}:${secondsLeft}.${millisLeft}`;
            }

            // Запускаем видео точно вовремя
            if (!videoStarted && timeToStart <= 0 && utcPlus10.getTime() < newYearTime.getTime()) {
                videoStarted = true;
                startVideo();
            }

            // Сбрасываем состояние
            if (utcPlus10.getTime() >= newYearTime.getTime()) {
                videoStarted = false;
            }

            // Обновляем сообщение в контейнере
            if (!videoStarted) {
                updateMessage(timeToStart);
            }
        }

        function updateMessage(timeToStart) {
            if (timeToStart > 0) {
                const hoursToStart = Math.floor(timeToStart / 3600000).toString().padStart(2, '0');
                const minutesToStart = Math.floor((timeToStart % 3600000) / 60000).toString().padStart(2, '0');
                const secondsToStart = Math.floor((timeToStart % 60000) / 1000).toString().padStart(2, '0');
                
                document.getElementById('message').textContent = 
                    `До начала трансляции: ${hoursToStart}:${minutesToStart}:${secondsToStart}`;
            }
        }

        // Добавим новые функции
        function startVideo() {
            const video = document.getElementById('videoPlayer');
            video.style.display = 'block';
            document.getElementById('message').style.display = 'none';
            video.currentTime = 0;
            video.muted = false;
            
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(e => {
                    console.error('Ошибка воспроизведения:', e);
                    // Повторная попытка воспроизведения
                    video.addEventListener('click', () => {
                        video.play().catch(console.error);
                    }, { once: true });
                    // Сбрасываем состояние при ошибке
                    videoStarted = false;
                    video.style.display = 'none';
                    document.getElementById('message').style.display = 'block';
                });
            }
        }

        function updateCountdown(currentTime) {
            const targetTime = new Date(currentTime);
            targetTime.setHours(videoConfig.targetHours, videoConfig.targetMinutes, videoConfig.targetSeconds, 0);
            
            if (targetTime < currentTime) {
                targetTime.setDate(targetTime.getDate() + 1);
            }
            
            const timeLeft = targetTime - currentTime;
            
            if (timeLeft > 0) {
                const hoursLeft = Math.floor(timeLeft / 3600000);
                const minutesLeft = Math.floor((timeLeft % 3600000) / 60000);
                const secondsLeft = Math.floor((timeLeft % 60000) / 1000);
                
                document.getElementById('message').textContent = 
                    `До Нового Года: ${hoursLeft.toString().padStart(2, '0')}:${minutesLeft.toString().padStart(2, '0')}:${secondsLeft.toString().padStart(2, '0')}`;
            }
        }

        // Заменяем setInterval на requestAnimationFrame
        function tick() {
            updateClock();
            requestAnimationFrame(tick);
        }

        // Заменяем setInterval на requestAnimationFrame
        requestAnimationFrame(tick);
        updateClock(); // Инициализация часов

        // Обработка окончания видео
        video.addEventListener('ended', () => {
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
            video.style.display = 'none';
            document.getElementById('message').textContent = 'С Новым Годом! 🎄';
            document.getElementById('message').style.display = 'block';
        });

        // Добавьте эти обработчики событий после объявления video
        video.addEventListener('loadeddata', () => {
            console.log('Видео загружено и готово к воспроизведению');
        });

        video.addEventListener('error', (e) => {
            console.error('Ошибка загрузки видео:', e);
        });
    </script>
</body>
</html>
